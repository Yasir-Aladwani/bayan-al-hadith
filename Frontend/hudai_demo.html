<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HudAI – نظام الإجابة بالحديث النبوي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080f0a;
    --surface: #0d1a0f;
    --card: #111e13;
    --card2: #162b1e;
    --border: #1e3a22;
    --border2: #2a4a2e;
    --gold: #d4af37;
    --gold2: #b8972e;
    --gold-dim: rgba(212,175,55,0.12);
    --green: #1a3a2a;
    --green2: #2a5a3a;
    --text: #f5edd6;
    --text2: #b8a07a;
    --text3: #6b8a6b;
    --accent: #4caf80;
    --err: #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Background Decoration ─────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(26,58,42,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 80% 90%, rgba(212,175,55,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,15,10,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    background: radial-gradient(circle, #1a3a2a, #0a1a10);
  }

  .logo-text {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: -2px;
  }

  .header-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: rgba(76,175,128,0.08);
    border: 1px solid rgba(76,175,128,0.25);
    border-radius: 20px;
    font-size: 11px;
    color: var(--accent);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.4; transform:scale(.8); }
  }

  /* ── Main Layout ─────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 16px;
    position: relative;
    z-index: 1;
  }

  /* ── Welcome ─────────────────────────────────────── */
  #welcome {
    text-align: center;
    padding: 48px 24px 32px;
    transition: opacity .4s, transform .4s;
  }

  #welcome.hidden {
    display: none;
  }

  .welcome-emoji {
    font-size: 60px;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 20px rgba(212,175,55,0.2));
  }

  .welcome-title {
    font-family: 'Cinzel', serif;
    font-size: 36px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .welcome-sub {
    color: var(--text3);
    font-size: 15px;
    margin-bottom: 24px;
  }

  .bismillah {
    font-family: 'Amiri', serif;
    font-size: 20px;
    color: rgba(212,175,55,0.6);
    margin-bottom: 32px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .suggestion-chip {
    padding: 8px 16px;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
  }

  .suggestion-chip:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-dim);
  }

  /* ── Chat ─────────────────────────────────────────── */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .message {
    margin-bottom: 20px;
    animation: slideIn .3s ease-out;
  }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(12px); }
    to { opacity:1; transform:translateY(0); }
  }

  .message.user { display: flex; justify-content: flex-start; }
  .message.assistant { display: flex; flex-direction: column; align-items: flex-end; }

  .bubble {
    max-width: 82%;
    padding: 14px 18px;
    border-radius: 16px;
    line-height: 1.75;
    font-size: 15px;
  }

  .bubble.user {
    background: var(--green);
    border: 1px solid rgba(42,90,58,.6);
    border-radius: 16px 16px 16px 4px;
    color: var(--text);
  }

  .bubble.assistant {
    background: var(--card);
    border: 1px solid rgba(212,175,55,.15);
    border-radius: 16px 16px 4px 16px;
    color: var(--text);
    white-space: pre-wrap;
    font-family: 'Cairo', sans-serif;
  }

  .bubble.error {
    background: rgba(255,107,107,0.08);
    border-color: rgba(255,107,107,0.3);
    color: var(--err);
    border-radius: 16px;
  }

  /* ── Typing Indicator ─────────────────────────────── */
  .typing {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    background: var(--card);
    border: 1px solid rgba(212,175,55,.1);
    border-radius: 16px 16px 4px 16px;
    max-width: 240px;
    margin-bottom: 20px;
    align-self: flex-end;
    animation: slideIn .3s ease-out;
  }

  .typing-text {
    font-size: 12px;
    color: var(--text3);
  }

  .dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: bounce .9s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce {
    0%,60%,100% { transform:translateY(0); opacity:.3; }
    30% { transform:translateY(-5px); opacity:1; }
  }

  /* ── Meta bar ─────────────────────────────────────── */
  .meta-bar {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .meta-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text3);
  }

  /* ── Source Cards ─────────────────────────────────── */
  .sources-container {
    margin-top: 10px;
    width: 100%;
    max-width: 82%;
    align-self: flex-end;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .source-card {
    background: var(--surface);
    border: 1px solid rgba(212,175,55,.12);
    border-radius: 10px;
    overflow: hidden;
  }

  .source-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background .2s;
  }

  .source-header:hover { background: rgba(255,255,255,0.02); }

  .grade-badge {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .grade-sahih {
    background: rgba(76,175,80,.12);
    border: 1px solid rgba(76,175,80,.35);
    color: #81c784;
  }

  .grade-hasan {
    background: rgba(212,175,55,.12);
    border: 1px solid rgba(212,175,55,.35);
    color: var(--gold);
  }

  .grade-default {
    background: rgba(107,138,107,.1);
    border: 1px solid rgba(107,138,107,.3);
    color: var(--text3);
  }

  .source-name {
    flex: 1;
    font-size: 12px;
    color: var(--text3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chevron {
    font-size: 14px;
    color: var(--text3);
    transition: transform .2s;
  }

  .source-body {
    display: none;
    padding: 0 12px 12px;
    border-top: 1px solid var(--border);
  }

  .source-card.open .source-body { display: block; }
  .source-card.open .chevron { transform: rotate(180deg); }

  .hadith-text {
    font-family: 'Amiri', serif;
    font-size: 16px;
    line-height: 2;
    color: var(--text);
    background: var(--card2);
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
    direction: rtl;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
    font-size: 12px;
  }

  .meta-label { color: var(--text3); font-weight: 600; white-space: nowrap; }
  .meta-value { color: var(--text2); }

  .copy-btn {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 10px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-family: 'Cairo', sans-serif;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    transition: all .2s;
  }

  .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Input ────────────────────────────────────────── */
  .input-area {
    position: sticky;
    bottom: 0;
    background: rgba(8,15,10,0.96);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 16px;
    margin: 0 -16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 20px;
    transition: border-color .2s;
    overflow: hidden;
  }

  .input-wrap:focus-within {
    border-color: rgba(212,175,55,.4);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.06);
  }

  textarea {
    width: 100%;
    padding: 13px 18px;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    color: var(--text);
    resize: none;
    direction: rtl;
    min-height: 50px;
    max-height: 120px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--text3); }

  .send-btn {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: none;
    background: var(--gold);
    color: #0a1a10;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(212,175,55,0.25);
  }

  .send-btn:hover { background: var(--gold2); transform: scale(1.05); }
  .send-btn:disabled {
    background: var(--border2);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn:disabled svg { opacity: .4; }

  /* ── Pipeline Steps Indicator ─────────────────────── */
  .pipeline-steps {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    max-width: 82%;
    align-self: flex-end;
    animation: slideIn .3s ease-out;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text3);
    transition: color .3s;
  }

  .step.active { color: var(--gold); }
  .step.done { color: var(--accent); }

  .step-icon { font-size: 13px; }

  /* ── Footer ─────────────────────────────────────────── */
  footer {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: var(--text3);
    position: relative; z-index: 1;
  }

  /* ── Scrollbar ─────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">🕌</div>
    <div>
      <div class="logo-text">HudAI</div>
      <div class="logo-sub">نظام الإجابة بالحديث النبوي</div>
    </div>
  </div>
  <div class="header-badge">
    <div class="status-dot"></div>
    الدرر السنية
  </div>
</header>

<!-- ── Main ───────────────────────────────────────── -->
<main>
  <!-- Welcome -->
  <div id="welcome">
    <span class="welcome-emoji">🕌</span>
    <div class="welcome-title">HudAI</div>
    <div class="welcome-sub">اسألني عن السنة النبوية – سأجيب من الأحاديث الصحيحة فقط</div>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    <div class="suggestions">
      <button class="suggestion-chip" onclick="useSuggestion(this)">ما فضل الصلاة في أول وقتها؟</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">ما هي آداب النوم في الإسلام؟</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">ما فضل الصدقة على الفقراء؟</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">ما حكم الصيام في رمضان؟</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">ما فضل قراءة القرآن الكريم؟</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-container" style="display:none; flex:1; overflow-y:auto;"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="اكتب سؤالك عن السنة النبوية..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</main>

<footer>يعتمد النظام حصرياً على الأحاديث الصحيحة من موقع الدرر السنية</footer>

<script>
// ─────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────
const DORAR_API  = 'https://dorar.net/dorar_api.json';
const ACCEPTED_GRADES = ['صحيح','حسن','ثابت','صحيح لغيره','حسن لغيره','صحيح الإسناد','حسن الإسناد'];

let isLoading = false;

// ─────────────────────────────────────────────────────────
// UI Helpers
// ─────────────────────────────────────────────────────────
function showChat() {
  document.getElementById('welcome').classList.add('hidden');
  const chat = document.getElementById('chat-container');
  chat.style.display = 'flex';
  chat.style.flexDirection = 'column';
}

function scrollToBottom() {
  const c = document.getElementById('chat-container');
  c.scrollTop = c.scrollHeight;
}

function addUserBubble(text) {
  const chat = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="bubble user">${escHtml(text)}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function addTyping() {
  const chat = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.id = 'typing';
  div.style.display = 'flex';
  div.style.justifyContent = 'flex-end';
  div.innerHTML = `
    <div class="typing">
      <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span class="typing-text">جارٍ البحث في الأحاديث...</span>
    </div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function addPipelineSteps() {
  removeTyping();
  const chat = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.id = 'pipeline';
  div.style.cssText = 'display:flex; justify-content:flex-end;';
  div.innerHTML = `
    <div class="pipeline-steps">
      <div class="step" id="step1"><span class="step-icon">🔍</span> استخراج الكلمة المفتاحية</div>
      <div class="step" id="step2"><span class="step-icon">📡</span> الاستعلام من الدرر السنية</div>
      <div class="step" id="step3"><span class="step-icon">🔎</span> تصفية الأحاديث الصحيحة</div>
      <div class="step" id="step4"><span class="step-icon">🧠</span> توليد الإجابة</div>
    </div>`;
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function updateStep(n, done=false) {
  const el = document.getElementById(`step${n}`);
  if (el) {
    el.classList.remove('active', 'done');
    el.classList.add(done ? 'done' : 'active');
    el.querySelector('.step-icon').textContent = done ? '✅' : ['🔍','📡','🔎','🧠'][n-1];
  }
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function removePipeline() {
  const p = document.getElementById('pipeline');
  if (p) p.remove();
}

function addAssistantMessage(answer, meta, sources) {
  removePipeline();
  const chat = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = 'message assistant';

  const sourcesHTML = sources.length > 0 ? `
    <div class="sources-container">
      ${sources.map((s,i) => buildSourceCard(s,i)).join('')}
    </div>` : '';

  div.innerHTML = `
    <div class="bubble assistant">${escHtml(answer)}</div>
    <div class="meta-bar">
      <div class="meta-chip">🔑 ${escHtml(meta.keyword)}</div>
      <div class="meta-chip">📊 ${meta.filtered}/${meta.total} حديث</div>
    </div>
    ${sourcesHTML}`;

  chat.appendChild(div);
  scrollToBottom();
}

function addErrorMessage(msg) {
  removePipeline();
  removeTyping();
  const chat = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = `<div class="bubble error">⚠️ ${escHtml(msg)}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function buildSourceCard(s, i) {
  const gradeClass = s.grade.includes('صحيح') ? 'grade-sahih'
                   : s.grade.includes('حسن') ? 'grade-hasan' : 'grade-default';
  return `
    <div class="source-card" id="src-${i}">
      <div class="source-header" onclick="toggleSource(${i})">
        <span class="grade-badge ${gradeClass}">${escHtml(s.grade)}</span>
        <span class="source-name">${escHtml(s.source)}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="source-body">
        <div class="hadith-text">${escHtml(s.text)}</div>
        <div class="meta-grid">
          <span class="meta-label">الراوي:</span><span class="meta-value">${escHtml(s.narrator)}</span>
          <span class="meta-label">المصدر:</span><span class="meta-value">${escHtml(s.source)}</span>
          <span class="meta-label">الدرجة:</span><span class="meta-value">${escHtml(s.grade)}</span>
        </div>
        <button class="copy-btn" onclick="copyHadith(${i})">📋 نسخ الحديث</button>
      </div>
    </div>`;
}

const copiedTexts = {};
function toggleSource(i) {
  document.getElementById(`src-${i}`).classList.toggle('open');
}

function copyHadith(i) {
  const text = copiedTexts[i];
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(`#src-${i} .copy-btn`);
    if (btn) { btn.textContent = '✅ تم النسخ'; setTimeout(() => btn.innerHTML = '📋 نسخ الحديث', 1500); }
  });
}

function escHtml(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('input').disabled = v;
}

// ─────────────────────────────────────────────────────────
// Pipeline Steps
// ─────────────────────────────────────────────────────────

// Step 2: Extract keyword via Claude API
async function extractKeyword(question) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 50,
      system: 'أنت نظام لاستخراج الكلمات المفتاحية. استخرج كلمة مفتاحية واحدة فقط (الأكثر أهمية) من السؤال الإسلامي المُدخَل. أجب بكلمة واحدة فقط بدون أي توضيح.',
      messages: [{ role: 'user', content: question }]
    })
  });
  const data = await res.json();
  const raw = data.content?.[0]?.text?.trim() || '';
  return raw.split(/\s+/)[0] || 'الصلاة';
}

// Step 3: Query Dorar API via CORS proxy
async function queryDorar(keyword) {
  // Using allorigins as CORS proxy for demo
  const url = `https://dorar.net/dorar_api.json?skey=${encodeURIComponent(keyword)}`;
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxyUrl);
  const wrapper = await res.json();
  const data = JSON.parse(wrapper.contents);
  return data?.ahadith?.result || [];
}

// Step 4: Parse HTML content
function parseHadith(raw) {
  const clean = (html) => {
    if (!html) return '';
    const div = document.createElement('div');
    div.innerHTML = html;
    return (div.textContent || '').replace(/\s+/g, ' ').trim();
  };
  const text = clean(raw.hadith || '');
  if (!text || text.length < 10) return null;
  const source = clean(raw.mohdith || '');
  const book = clean(raw.book || '');
  return {
    text,
    narrator: clean(raw.rawi || '') || 'غير محدد',
    source: book ? (source ? `${source} - ${book}` : book) : (source || 'غير محدد'),
    grade: clean(raw.grade || '') || 'غير محدد',
  };
}

// Step 5: Filter by grade
function filterHadiths(hadiths) {
  return hadiths.filter(h =>
    ACCEPTED_GRADES.some(g => h.grade.includes(g))
  );
}

// Step 6 + 7: Build prompt + Generate answer
async function generateAnswer(question, hadiths) {
  const MAX = 5;
  const slice = hadiths.slice(0, MAX);

  const context = slice.map((h, i) =>
    `[حديث ${i+1}]\nالنص: ${h.text}\nالراوي: ${h.narrator}\nالمصدر: ${h.source}\nالدرجة: ${h.grade}`
  ).join('\n\n');

  const fewShot = `=== مثال توضيحي ===
السؤال: ما فضل قراءة سورة الإخلاص؟
السياق:
[حديث 1]
النص: من قرأ قل هو الله أحد عشر مرات بنى الله له بيتا في الجنة
الراوي: معاذ بن أنس الجهني
المصدر: مسند أحمد - حسن لغيره
الإجابة:
إن سورة الإخلاص من السور العظيمة، فمن قرأها عشر مرات بنى الله له بيتاً في الجنة.
الدليل:
- الحديث: من قرأ قل هو الله أحد عشر مرات بنى الله له بيتا في الجنة
- الراوي: معاذ بن أنس الجهني
- المصدر: مسند أحمد
- الدرجة: حسن لغيره
=== نهاية المثال ===`;

  const prompt = `${fewShot}

السؤال: ${question}

السياق (الأحاديث المُصفَّاة):
${context || 'لا توجد أحاديث متاحة.'}

التعليمات الصارمة:
1. أجب فقط بناءً على الأحاديث الواردة أعلاه – لا تستخدم أي معلومات خارجية.
2. إذا لم تكن الأحاديث كافية، قل: "لا توجد معلومات كافية في الأحاديث المتاحة للإجابة على هذا السؤال."
3. اذكر الدليل من الأحاديث في نهاية إجابتك.
4. الإجابة باللغة العربية الفصحى.

الإجابة:`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      temperature: 0.1,
      system: 'أنت نظام إجابة إسلامي يعتمد حصراً على الأحاديث النبوية المُقدَّمة. لا تضف أي معلومات من عندك.',
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text?.trim() || 'لم يتمكن النظام من توليد إجابة.';
}

// ─────────────────────────────────────────────────────────
// Main Flow
// ─────────────────────────────────────────────────────────
async function sendQuestion() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  input.style.height = '';
  showChat();
  addUserBubble(question);
  setLoading(true);
  addTyping();

  const steps = addPipelineSteps();

  try {
    // Step 2
    updateStep(1);
    const keyword = await extractKeyword(question);
    updateStep(1, true);

    // Step 3
    updateStep(2);
    let rawResults = [];
    try {
      rawResults = await queryDorar(keyword);
    } catch(e) {
      // CORS may fail in some environments - continue gracefully
      console.warn('Dorar API failed:', e);
    }
    updateStep(2, true);

    // Step 4 + 5
    updateStep(3);
    const parsed = rawResults.map(parseHadith).filter(Boolean);
    const filtered = filterHadiths(parsed);
    updateStep(3, true);

    // Store for copy
    filtered.forEach((h, i) => { copiedTexts[i] = h.text; });

    // Step 7
    updateStep(4);
    const answer = await generateAnswer(question, filtered);
    updateStep(4, true);

    // Step 8
    addAssistantMessage(answer, {
      keyword,
      total: rawResults.length,
      filtered: filtered.length,
    }, filtered.slice(0, 5));

  } catch (err) {
    addErrorMessage(`حدث خطأ أثناء المعالجة: ${err.message}`);
  } finally {
    setLoading(false);
  }
}

// ─────────────────────────────────────────────────────────
// Misc
// ─────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
}

function useSuggestion(btn) {
  document.getElementById('input').value = btn.textContent;
  sendQuestion();
}
